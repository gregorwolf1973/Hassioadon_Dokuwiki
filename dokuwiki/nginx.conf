worker_processes 1;

events { worker_connections 1024; }

http {
    include mime.types;
    default_type application/octet-stream;

    server {
        listen 8080;
        root /var/www/dokuwiki;
        index index.php doku.php;

        # --- INGRESS SECURITY ---
        # Only allow requests from the Home Assistant Supervisor
        allow 172.30.32.2;
        deny all;

        location / {
            try_files $uri $uri/ @dokuwiki;
        }

        location @dokuwiki {
            rewrite ^/_media/(.*) /lib/exe/fetch.php?media=$1 last;
            rewrite ^/_detail/(.*) /lib/exe/detail.php?media=$1 last;
            rewrite ^/_export/([^/]+)/(.*) /doku.php?do=export_$1&id=$2 last;
            rewrite ^/(.*) /doku.php?id=$1 last;
        }

        # DokuWiki exe files
        location ~ ^/lib/exe/.*\.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            # Passes the Ingress path header to PHP
            fastcgi_param HTTP_X_INGRESS_PATH $http_x_ingress_path;
        }

        # Plugin AJAX
        location ~ ^/lib/plugins/.*\.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param DOKU_INC /var/www/dokuwiki/;
            # Passes the Ingress path header to PHP
            fastcgi_param HTTP_X_INGRESS_PATH $http_x_ingress_path;
        }

        # General PHP files
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            # Passes the Ingress path header to PHP
            fastcgi_param HTTP_X_INGRESS_PATH $http_x_ingress_path;
        }

        # Security: Deny access to sensitive directories
        location ~ ^/(data|conf|bin|inc)/ {
            deny all;
       
        }
    }
}
